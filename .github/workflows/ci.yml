name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCHUBERT_ROOT: ${{ github.workspace }}

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Schubert
      - name: Checkout Amari
        uses: actions/checkout@v4
        with:
          repository: justinelliottcobb/Amari
          path: amari
      - name: Checkout Karpal
        uses: actions/checkout@v4
        with:
          repository: Industrial-Algebra/Karpal
          path: karpal
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: Schubert
      - name: Run clippy (all features)
        working-directory: Schubert
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "--features serde"
          - "--features karpal"
          - "--features parallel"
          - "--features serde,karpal,parallel"
    steps:
      - uses: actions/checkout@v4
        with:
          path: Schubert
      - name: Checkout Amari
        uses: actions/checkout@v4
        with:
          repository: justinelliottcobb/Amari
          path: amari
      - name: Checkout Karpal
        uses: actions/checkout@v4
        with:
          repository: Industrial-Algebra/Karpal
          path: karpal
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: Schubert
      - name: Run tests ${{ matrix.features }}
        working-directory: Schubert
        run: cargo test ${{ matrix.features }}

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Schubert
      - name: Checkout Amari
        uses: actions/checkout@v4
        with:
          repository: justinelliottcobb/Amari
          path: amari
      - name: Checkout Karpal
        uses: actions/checkout@v4
        with:
          repository: Industrial-Algebra/Karpal
          path: karpal
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: Schubert
      - name: Build docs (all features)
        working-directory: Schubert
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Schubert
      - name: Checkout Amari
        uses: actions/checkout@v4
        with:
          repository: justinelliottcobb/Amari
          path: amari
      - name: Checkout Karpal
        uses: actions/checkout@v4
        with:
          repository: Industrial-Algebra/Karpal
          path: karpal
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: Schubert
      - name: Check wasm32 build (no default features)
        working-directory: Schubert
        run: cargo check --target wasm32-unknown-unknown --no-default-features
      - name: Check wasm32 build (wasm feature)
        working-directory: Schubert
        run: cargo check --target wasm32-unknown-unknown --features wasm
